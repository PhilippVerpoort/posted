columns:
    carbon_capture:
        name: Carbon Capture
        description: Whether, how, and how much CO2 is captured from the process.
        type: case
        coded: True
        codes:
            No Capture: Conventional process without CO2 capture
            With Capture: Process with carbon capture installed
    mode:
        name: Operation Mode
        description: Which energy carrier to operate the shaft furnace with.
        type: case
        coded: True
        codes:
            H2: Operate fully with hydrogen.
            NG: Operate fully with natural gas.
    component:
        name: component
        description: Allows to subdivide variables into further sub-components, e.g. for hydrogen demand.
        type: component
        coded: False
    period: period
variables:
    predefined:
        - technology
mappings:
    - full_load_hours
    - fixed_opex_relative
    - fixed_opex_specific
    - capacities_to_activities
    - activities
